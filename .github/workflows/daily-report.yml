name: Daily Web3 Builder Pulse

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TALENT_WALLET: ${{ secrets.TALENT_WALLET }}
        run: node bot.js

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          git diff --staged --quiet || git commit -m "🔭 Daily Web3 Builder Pulse $(date +'%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/volkkov/web3-builder.git main
