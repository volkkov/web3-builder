<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="talent-verify" content="volkkov">
  <title>Web3 Builder Pulse 🔭</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000010;
      color: #e0e0ff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* STARS */
    #stars-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .content { position: relative; z-index: 1; }

    /* HEADER */
    header {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 900;
      background: linear-gradient(135deg, #00f5ff, #7b2fff, #ff006e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      letter-spacing: 2px;
    }

    .tagline {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      color: #7b8cde;
      margin-top: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .pulse-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #00f5ff;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
      box-shadow: 0 0 10px #00f5ff;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      padding: 20px;
      margin: 0 auto 40px;
      max-width: 800px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-family: 'Orbitron', monospace;
      font-size: 32px;
      font-weight: 700;
      color: #00f5ff;
      text-shadow: 0 0 20px #00f5ff88;
    }

    .stat-label {
      font-size: 11px;
      color: #7b8cde;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* CHART SECTION */
    .chart-section {
      max-width: 900px;
      margin: 0 auto 50px;
      padding: 0 20px;
    }

    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      color: #7b2fff;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #7b2fff44, transparent);
    }

    .chart-card {
      background: rgba(123, 47, 255, 0.05);
      border: 1px solid rgba(123, 47, 255, 0.2);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
    }

    /* REPORTS GRID */
    .reports-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .report-card {
      background: rgba(0, 245, 255, 0.03);
      border: 1px solid rgba(0, 245, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .report-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #00f5ff, #7b2fff);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .report-card:hover {
      border-color: rgba(0, 245, 255, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 245, 255, 0.1);
    }

    .report-card:hover::before { opacity: 1; }

    .report-date {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      color: #00f5ff;
      margin-bottom: 12px;
    }

    .report-repos {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .repo-tag {
      font-size: 10px;
      background: rgba(123, 47, 255, 0.2);
      border: 1px solid rgba(123, 47, 255, 0.3);
      color: #b09fff;
      padding: 3px 8px;
      border-radius: 20px;
      font-family: 'Orbitron', monospace;
    }

    .report-number {
      font-size: 11px;
      color: #7b8cde;
      letter-spacing: 1px;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 16, 0.95);
      z-index: 100;
      overflow-y: auto;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: #050520;
      border: 1px solid rgba(0, 245, 255, 0.2);
      border-radius: 20px;
      padding: 40px;
      max-width: 800px;
      width: 100%;
      margin: 40px auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: 1px solid rgba(0, 245, 255, 0.3);
      color: #00f5ff;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover { background: rgba(0, 245, 255, 0.1); }

    .modal-content {
      white-space: pre-wrap;
      line-height: 1.8;
      color: #c0c8ff;
      font-size: 14px;
    }

    .modal-content h2 {
      font-family: 'Orbitron', monospace;
      color: #00f5ff;
      font-size: 18px;
      margin: 24px 0 12px;
    }

    .modal-content h3 {
      font-family: 'Orbitron', monospace;
      color: #7b2fff;
      font-size: 14px;
      margin: 20px 0 8px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 30px;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #2a2a5a;
      letter-spacing: 2px;
      position: relative;
      z-index: 1;
    }

    .loading {
      text-align: center;
      padding: 60px;
      font-family: 'Orbitron', monospace;
      color: #7b8cde;
      font-size: 13px;
      letter-spacing: 2px;
    }

    .error-msg {
      text-align: center;
      color: #ff4466;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      padding: 20px;
    }
  </style>
</head>
<body>
<canvas id="stars-canvas"></canvas>

<div class="content">
  <header>
    <div class="logo">🔭 Web3 Builder Pulse</div>
    <div class="tagline"><span class="pulse-dot"></span>Daily AI digest · What builders are shipping</div>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-item">
      <div class="stat-number" id="stat-reports">—</div>
      <div class="stat-label">Reports</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="stat-streak">—</div>
      <div class="stat-label">Day Streak</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="stat-repos">—</div>
      <div class="stat-label">Repos Tracked</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="section-title">📈 Top Repos by Stars</div>
    <div class="chart-card">
      <canvas id="starsChart" height="120"></canvas>
    </div>
  </div>

  <div class="reports-section">
    <div class="section-title">📋 Daily Reports Archive</div>
    <div id="reports-grid" class="reports-grid">
      <div class="loading">LOADING REPORTS...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-content" id="modal-content">Loading...</div>
  </div>
</div>

<footer>WEB3 BUILDER PULSE · POWERED BY AI · BY VOLKKOV</footer>

<script>
const GITHUB_USER = "volkkov";
const GITHUB_REPO = "web3-builder";
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

// ── STARS ANIMATION ──────────────────────────────────────────
const canvas = document.getElementById("stars-canvas");
const ctx = canvas.getContext("2d");
let stars = [];

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({ length: 200 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.2,
    speed: Math.random() * 0.3 + 0.05,
    opacity: Math.random()
  }));
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.opacity += (Math.random() - 0.5) * 0.02;
    s.opacity = Math.max(0.1, Math.min(1, s.opacity));
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 200, 255, ${s.opacity})`;
    ctx.fill();
  });
  requestAnimationFrame(animateStars);
}

window.addEventListener("resize", initStars);
initStars();
animateStars();

// ── LOAD DATA ────────────────────────────────────────────────
async function loadStats() {
  try {
    const res = await fetch(`${RAW_BASE}/reports/stats.json?t=${Date.now()}`);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function loadHistory() {
  try {
    const res = await fetch(`${RAW_BASE}/reports/history.json?t=${Date.now()}`);
    if (!res.ok) return [];
    return await res.json();
  } catch { return []; }
}

async function loadReport(filename) {
  const res = await fetch(`${RAW_BASE}/reports/${filename}?t=${Date.now()}`);
  if (!res.ok) throw new Error("Not found");
  return await res.text();
}

// ── RENDER CHART ─────────────────────────────────────────────
function renderChart(topRepos) {
  const chartCtx = document.getElementById("starsChart").getContext("2d");
  new Chart(chartCtx, {
    type: "bar",
    data: {
      labels: topRepos.map(r => r.name),
      datasets: [{
        label: "⭐ Stars",
        data: topRepos.map(r => r.stars),
        backgroundColor: topRepos.map((_, i) =>
          `hsla(${200 + i * 30}, 100%, 60%, 0.6)`
        ),
        borderColor: topRepos.map((_, i) =>
          `hsla(${200 + i * 30}, 100%, 70%, 1)`
        ),
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: {
          ticks: { color: "#7b8cde", font: { family: "Orbitron", size: 10 } },
          grid: { color: "rgba(123,47,255,0.1)" }
        },
        y: {
          ticks: { color: "#7b8cde", font: { size: 10 } },
          grid: { color: "rgba(123,47,255,0.1)" }
        }
      }
    }
  });
}

// ── RENDER REPORTS ───────────────────────────────────────────
function renderReports(history) {
  const grid = document.getElementById("reports-grid");
  if (!history.length) {
    grid.innerHTML = `<div class="error-msg">No reports yet — bot runs soon! 🤖</div>`;
    return;
  }

  grid.innerHTML = history.map((item, i) => `
    <div class="report-card" onclick="openReport('${item.reportFile}', '${item.date}')">
      <div class="report-number">REPORT #${history.length - i}</div>
      <div class="report-date">📅 ${item.date}</div>
      <div class="report-repos">
        ${(item.topRepos || []).slice(0, 3).map(r =>
          `<span class="repo-tag">${r.name}</span>`
        ).join("")}
      </div>
    </div>
  `).join("");
}

// ── MODAL ────────────────────────────────────────────────────
async function openReport(filename, date) {
  const overlay = document.getElementById("modal-overlay");
  const content = document.getElementById("modal-content");
  overlay.classList.add("active");
  content.innerHTML = `<div class="loading">LOADING REPORT ${date}...</div>`;

  try {
    const text = await loadReport(filename);
    // Simple markdown → HTML
    const html = text
      .replace(/^## (.+)$/gm, "<h2>$1</h2>")
      .replace(/^### (.+)$/gm, "<h3>$1</h3>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\n/g, "<br>");
    content.innerHTML = html;
  } catch {
    content.innerHTML = `<div class="error-msg">Failed to load report</div>`;
  }
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("active");
}

document.getElementById("modal-overlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  const [stats, history] = await Promise.all([loadStats(), loadHistory()]);

  if (stats) {
    document.getElementById("stat-reports").textContent = stats.totalReports || 0;
    document.getElementById("stat-repos").textContent = (stats.topRepos || []).length * 10 + "+";
    if (stats.topRepos && stats.topRepos.length) renderChart(stats.topRepos);
  }

  document.getElementById("stat-streak").textContent = history.length || 0;
  renderReports(history);
}

init();
</script>
</body>
</html>
